    display: flex;
    justify-content: center;
    background: #fff;
    box-shadow: 0 2px 10px rgba(0,0,0,.1);
    position: sticky; top: 0; z-index: 200;
  }
  .tab-btn {
    padding: 16px 52px;
    font-size: 1.05rem; font-weight: 700;
    border: none; background: transparent; cursor: pointer;
    color: #718096;
    border-bottom: 4px solid transparent;
    transition: .2s;
    font-family: inherit;
  }
  .tab-btn:hover  { color: #1a56a8; background: #ebf4ff; }
  .tab-btn.active { color: #1a56a8; border-bottom-color: #1a56a8; }

  /* ── PAGE CONTENT ── */
  .tab-content { display: none; padding: 28px 24px; max-width: 1440px; margin: 0 auto; }
  .tab-content.active { display: block; }

  /* ── SUMMARY BANNER ── */
  .summary-banner {
    background: #fff;
    border-radius: 16px;
    padding: 22px 32px;
    margin-bottom: 28px;
    box-shadow: 0 4px 18px rgba(0,0,0,.07);
    display: flex; flex-wrap: wrap; gap: 8px; align-items: stretch;
  }
  .sum-stat {
    flex: 1; min-width: 130px;
    text-align: center;
    padding: 12px 8px;
    border-left: 1px solid #e2e8f0;
  }
  .sum-stat:last-child { border-left: none; }
  .sum-stat .sv { font-size: 2.2rem; font-weight: 800; color: #1a56a8; line-height: 1.1; }
  .sum-stat .sl { font-size: .78rem; color: #718096; margin-top: 5px; line-height: 1.3; }
  .sum-stat.green .sv  { color: #276749; }
  .sum-stat.orange .sv { color: #c05621; }

  /* ── SECTION TITLE ── */

    font-size: 1.2rem; font-weight: 700; color: #0f2957;
    margin-bottom: 18px; padding-bottom: 8px;
    border-bottom: 3px solid #bee3f8;
    display: flex; align-items: center; gap: 10px;
  }

  /* ── QUESTIONS GRID ── */
  .questions-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(580px, 1fr));
    gap: 20px;
  }

  /* ── QUESTION CARD ── */
  .q-card {
    background: #fff;
    border-radius: 14px;
    padding: 20px 22px 16px;
    box-shadow: 0 3px 14px rgba(0,0,0,.07);
    border-right: 6px solid #1a56a8;
    display: flex; flex-direction: column; gap: 10px;
  }

  .q-header { display: flex; align-items: flex-start; gap: 10px; }
  .q-num {
    flex-shrink: 0;
    width: 34px; height: 34px; border-radius: 50%;
    background: #1a56a8; color: #fff;
    font-size: .9rem; font-weight: 800;
    display: flex; align-items: center; justify-content: center;
  }
  .q-texts { flex: 1; }
  .q-text-main { font-size: .97rem; font-weight: 700; color: #1a202c; line-height: 1.45; }
  .q-text-trans {
    font-size: .82rem; color: #718096; font-style: italic;
    margin-top: 4px; line-height: 1.4;
    padding: 4px 8px; background: #f7fafc; border-radius: 6px;
  }

  /* stats row */
  .q-stats { display: flex; gap: 8px; flex-wrap: wrap; }
  .badge {
    padding: 3px 11px; border-radius: 20px; font-size: .8rem; font-weight: 700;
  }
  .badge-blue   { background: #ebf4ff; color: #1a56a8; }
  .badge-green  { background: #f0fff4; color: #276749; }
  .badge-orange { background: #fffaf0; color: #c05621; }
  .badge-gray   { background: #f7fafc; color: #4a5568; }

  /* charts row */
  .charts-row {
    display: flex; gap: 12px; align-items: center;
  }
  .bar-wrap  { flex: 3; height: 175px; position: relative; }
  .pie-wrap  { flex: 1.2; height: 155px; position: relative; }

  /* legend */
  .score-legend {
    display: flex; gap: 6px; flex-wrap: wrap; margin-top: 2px;
  }
  .score-legend span {
    display: flex; align-items: center; gap: 4px;
    font-size: .72rem; color: #4a5568;
  }
  .score-legend span::before {
    content: '';
    width: 10px; height: 10px; border-radius: 2px;
    display: inline-block;
  }

  .leg2::before { background: #ed8936; }
  .leg3::before { background: #d69e2e; }
  .leg4::before { background: #38a169; }
  .leg5::before { background: #2b6cb0; }

    .tab-btn { padding: 14px 20px; font-size: .9rem; }
    .charts-row { flex-direction: column; }
    .bar-wrap, .pie-wrap { width: 100%; }
    .pie-wrap { height: 170px; }

/* ── TAB SWITCH ── */
function showTab(id) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + id).classList.add('active');
  document.getElementById('btn-' + id).classList.add('active');
}

/* ── OVERALL AVG of averages ── */
function overallAvg(stats) {
  return (stats.reduce((s,q) => s + q.avg, 0) / stats.length).toFixed(2);
}
function overallPos(stats) {
  return (stats.reduce((s,q) => s + q.pos, 0) / stats.length).toFixed(1);
}
function bestQ(stats) {
  return stats.reduce((best, q, i) => q.avg > stats[best].avg ? i : best, 0);
}
function worstQ(stats) {
  return stats.reduce((worst, q, i) => q.avg < stats[worst].avg ? i : worst, 0);
}

/* ── RENDER SUMMARY BANNER ── */

  const el = document.getElementById(containerId);
  const totalResp = stats[0].total;
  const avg = overallAvg(stats);
  const pos = overallPos(stats);
  const best = bestQ(stats) + 1;
  const worst = worstQ(stats) + 1;

  el.innerHTML = `
    <div class="sum-stat">
      <div class="sv">${totalResp}</div>
      <div class="sl">${respondentsLabel}</div>
    </div>
    <div class="sum-stat">
      <div class="sv">${avg}</div>

    <div class="sum-stat orange">

}

        <div class="q-stats">
          <span class="badge badge-gray">n = ${s.total}</span>
          <span class="badge badge-blue">ממוצע: ${s.avg.toFixed(2)}</span>
          <span class="badge ${posBadge}">ציוני 4–5: ${s.pos}%</span>
        </div>
        <div class="charts-row">
          <div class="bar-wrap">
            <canvas id="bar-${cardId}"></canvas>
          </div>
          <div class="pie-wrap">
            <canvas id="pie-${cardId}"></canvas>
          </div>
        </div>
        <div class="score-legend">
          <span class="leg1">ציון 1</span>
          <span class="leg2">ציון 2</span>
          <span class="leg3">ציון 3</span>
          <span class="leg4">ציון 4</span>
          <span class="leg5">ציון 5</span>
        </div>
      </div>
    `;
  });

  /* Create charts AFTER DOM is updated */
  stats.forEach((s, idx) => {
    const qNum = idx + 1;
    const cardId = `${gridId}-q${qNum}`;
    const dist = [s.d1, s.d2, s.d3, s.d4, s.d5];
    const scoreLabels = ['1','2','3','4','5'];

    // Bar chart
    const barKey = `bar-${cardId}`;
    if (chartInstances[barKey]) chartInstances[barKey].destroy();
    chartInstances[barKey] = new Chart(
      document.getElementById(barKey),
      {
        type: 'bar',
        data: {
          labels: scoreLabels,
          datasets: [{
            label: 'מספר תגובות',
            data: dist,
            backgroundColor: SCORE_COLORS,
            borderRadius: 5,
            borderSkipped: false,
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: ctx => ` ${ctx.raw} תגובות (${((ctx.raw/s.total)*100).toFixed(1)}%)`,
              }
            }
          },
          scales: {
            x: {
              grid: { display: false },
              ticks: { font: { size: 13, weight: '700' } }
            },
            y: {
              beginAtZero: true,
              ticks: { stepSize: 1, font: { size: 10 } },
              grid: { color: '#f0f0f0' }
            }
          }
        }
      }
    );

    // Pie / Doughnut chart
    const pieKey = `pie-${cardId}`;
    if (chartInstances[pieKey]) chartInstances[pieKey].destroy();
    chartInstances[pieKey] = new Chart(
      document.getElementById(pieKey),
      {
        type: 'doughnut',
        data: {
          labels: scoreLabels.map(l => `ציון ${l}`),
          datasets: [{
            data: dist,
            backgroundColor: SCORE_COLORS,
            borderWidth: 2,
            borderColor: '#fff',
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          cutout: '55%',
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: ctx => ` ${ctx.raw} (${((ctx.raw/s.total)*100).toFixed(1)}%)`,
              }
            }
          }
        }
      }
    );
  });
}

/* ── INIT ── */
renderSummary('he-summary', HE_STATS, 'משיבים עבריים');
renderSummary('ar-summary', AR_STATS, 'משיבים ערביים');
renderCards('he-grid', HE_STATS, HE_QUESTIONS, null,       'he');
renderCards('ar-grid', AR_STATS, AR_QUESTIONS, AR_TRANS, 'ar');
</script>
</body>
</html>
