<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ניתוח משובים | תשפ"ו</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
.header{background:linear-gradient(135deg,#1e293b,#0f172a);padding:1.75rem 2rem;text-align:center;border-bottom:1px solid #334155}
.header h1{font-size:1.9rem;font-weight:800;color:#f8fafc;margin-bottom:.35rem}
.header p{color:#94a3b8;font-size:.9rem}
/* Tabs */
.tabs{display:flex;gap:0;border-bottom:2px solid #334155;padding:0 2rem;max-width:1400px;margin:0 auto}
.tab{padding:.75rem 1.5rem;font-size:.9rem;font-weight:600;color:#64748b;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s}
.tab.active{color:#f8fafc;border-bottom-color:#6366f1}
.tab:hover{color:#cbd5e1}
/* Pages */
.page{display:none}.page.active{display:block}
/* Home grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:1.25rem;padding:1.75rem 2rem;max-width:1400px;margin:0 auto}
.card{background:#1e293b;border-radius:1rem;padding:1.4rem;cursor:pointer;transition:transform .18s,box-shadow .18s;border:1px solid #334155;position:relative;overflow:hidden}
.card:hover{transform:translateY(-3px);box-shadow:0 18px 36px rgba(0,0,0,.4)}
.card::before{content:'';position:absolute;top:0;right:0;left:0;height:3px;background:var(--c)}
.card-icon{font-size:2.2rem;margin-bottom:.6rem}
.card-title{font-size:1.15rem;font-weight:700;color:#f8fafc;margin-bottom:.2rem}
.card-desc{font-size:.81rem;color:#94a3b8;margin-bottom:.9rem;line-height:1.5}
.card-stats{display:flex;gap:.6rem;margin-bottom:.9rem}
.stat{background:#0f172a;border-radius:.45rem;padding:.4rem .6rem;flex:1;text-align:center}
.stat-lbl{font-size:.65rem;color:#64748b;text-transform:uppercase;letter-spacing:.04em}
.stat-val{font-size:1.05rem;font-weight:700;color:#f8fafc}
.card-imp{background:#0f172a;border-radius:.45rem;padding:.6rem .9rem;display:flex;align-items:center;gap:.6rem}
.imp-arrow{font-size:1.2rem;font-weight:800}
.imp-txt{font-size:.79rem;color:#94a3b8}
.pos{color:#34d399}.neg{color:#f87171}.neu{color:#94a3b8}
/* Amadot home card special */
.amadot-card{background:linear-gradient(135deg,#1e1b4b,#1e293b);border:1px solid #4338ca}
.amadot-card::before{background:linear-gradient(90deg,#6366f1,#a78bfa)}
/* Detail pages */
.det-hdr{background:#1e293b;padding:1.1rem 2rem;display:flex;align-items:center;gap:1rem;border-bottom:1px solid #334155;position:sticky;top:0;z-index:10}
.back-btn{background:#334155;border:none;color:#e2e8f0;padding:.45rem 1rem;border-radius:.45rem;cursor:pointer;font-size:.88rem;font-family:inherit;transition:background .2s}
.back-btn:hover{background:#475569}
.det-title{font-size:1.35rem;font-weight:800;color:#f8fafc;display:flex;align-items:center;gap:.5rem}
.det-body{max-width:1200px;margin:0 auto;padding:1.75rem 2rem}
/* Summary cards */
.sum-row{display:grid;grid-template-columns:repeat(4,1fr);gap:.9rem;margin-bottom:1.75rem}
.sum-card{background:#1e293b;border-radius:.75rem;padding:.9rem 1.1rem;border:1px solid #334155}
.sum-card h3{font-size:.68rem;color:#64748b;text-transform:uppercase;letter-spacing:.05em;margin-bottom:.25rem}
.sum-big{font-size:1.7rem;font-weight:800;color:#f8fafc}
.sum-sub{font-size:.75rem;color:#94a3b8;margin-top:.1rem}
/* Section heading */
.sec-ttl{font-size:.78rem;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.07em;margin-bottom:.9rem;padding-bottom:.4rem;border-bottom:1px solid #334155}
/* Overview chart */
.ov-wrap{background:#1e293b;border-radius:.9rem;padding:1.35rem;margin-bottom:1.75rem;border:1px solid #334155}
.ov-chart{position:relative;height:270px}
/* Question cards */
.q-list{display:grid;gap:1.25rem}
.q-card{background:#1e293b;border-radius:.9rem;padding:1.35rem;border:1px solid #334155}
.q-num{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:.2rem}
.q-text{font-size:.97rem;font-weight:600;color:#f8fafc;margin-bottom:.75rem;line-height:1.5}
.correct-badge{display:inline-flex;align-items:center;gap:.25rem;background:#064e3b;color:#34d399;padding:.2rem .75rem;border-radius:2rem;font-size:.76rem;font-weight:600;margin-bottom:.9rem}
.q-chart-box{position:relative}
.pct-row{display:grid;grid-template-columns:1fr 1fr;gap:.65rem;margin-top:.9rem}
.pct-card{background:#0f172a;border-radius:.45rem;padding:.65rem .9rem;text-align:center}
.pct-lbl{font-size:.65rem;color:#64748b;text-transform:uppercase;letter-spacing:.04em}
.pct-val{font-size:1.5rem;font-weight:800}
.pct-blue{color:#60a5fa}.pct-green{color:#34d399}
.delta{font-size:.82rem;font-weight:600}
/* ===== AMADOT section ===== */
.amadot-body{max-width:1200px;margin:0 auto;padding:1.75rem 2rem}
.amadot-sumrow{display:grid;grid-template-columns:repeat(5,1fr);gap:.9rem;margin-bottom:1.75rem}
.grade-pills{display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.5rem}
.grade-pill{background:#1e293b;border:1px solid #334155;border-radius:2rem;padding:.2rem .7rem;font-size:.75rem;color:#e2e8f0}
/* Amadot group card */
.group-card{background:#1e293b;border-radius:.9rem;padding:1.35rem;border:1px solid #334155;margin-bottom:1.5rem}
.group-title{font-size:1rem;font-weight:700;margin-bottom:1rem;display:flex;align-items:center;gap:.5rem}
.group-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.amadot-q{background:#0f172a;border-radius:.65rem;padding:1rem 1.1rem;margin-bottom:.8rem}
.amadot-q:last-child{margin-bottom:0}
.amadot-q-text{font-size:.9rem;font-weight:600;color:#f8fafc;margin-bottom:.65rem;line-height:1.5}
.amadot-q-meta{display:flex;align-items:center;gap:1rem;margin-bottom:.6rem}
.avg-badge{font-size:1.1rem;font-weight:800;color:#f8fafc}
.avg-of{font-size:.75rem;color:#64748b}
.pos-badge{font-size:.82rem;font-weight:600;color:#34d399}
/* Likert bar */
.likert-bar{display:flex;height:22px;border-radius:4px;overflow:hidden;gap:1px}
.likert-seg{height:100%;display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:700;color:rgba(255,255,255,.8);transition:all .3s;min-width:0}
.l1{background:#ef4444}.l2{background:#f97316}.l3{background:#eab308}.l4{background:#22c55e}.l5{background:#16a34a}
.likert-legend{display:flex;gap:.5rem;margin-top:.35rem;font-size:.68rem;color:#64748b;flex-wrap:wrap}
.ll-item{display:flex;align-items:center;gap:.25rem}
.ll-dot{width:10px;height:10px;border-radius:2px}
/* Binary question special */
.binary-bar{display:flex;height:28px;border-radius:6px;overflow:hidden}
.binary-yes{background:#16a34a;display:flex;align-items:center;justify-content:center;font-size:.82rem;font-weight:700;color:#fff}
.binary-no{background:#ef4444;display:flex;align-items:center;justify-content:center;font-size:.82rem;font-weight:700;color:#fff}
/* Radar/overview amadot chart */
.amadot-ov-wrap{background:#1e293b;border-radius:.9rem;padding:1.35rem;border:1px solid #334155;margin-bottom:1.75rem}
@media(max-width:700px){.sum-row,.amadot-sumrow{grid-template-columns:1fr 1fr}.grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="header">
  <h1>📊 ניתוח משובים | תשפ"ו</h1>
  <p>מערכת ניתוח ידע ועמדות תלמידים — בחרו רובריקה לסקירה מפורטת</p>
</div>

<!-- TABS -->
<div class="tabs">
  <div class="tab active" onclick="switchTab('prepost')">📚 השוואת פרה-פוסט</div>
  <div class="tab" onclick="switchTab('amadot')">💡 שאלון עמדות</div>
</div>

<!-- PRE-POST PAGE -->
<div class="page active" id="page-prepost">
  <div id="home-pp">
    <div class="grid" id="topicGrid"></div>
  </div>
  <div id="detail-pp" style="display:none">
    <div class="det-hdr">
      <button class="back-btn" onclick="showHome()">← חזרה</button>
      <div class="det-title" id="detTitle"></div>
    </div>
    <div class="det-body">
      <div class="sum-row" id="sumRow"></div>
      <div class="sec-ttl">סקירה כללית — % תשובות נכונות לפי שאלה</div>
      <div class="ov-wrap"><div class="ov-chart"><canvas id="ovCanvas"></canvas></div></div>
      <div class="sec-ttl">פירוט לפי שאלה</div>
      <div class="q-list" id="qList"></div>
    </div>
  </div>
</div>

<!-- AMADOT PAGE -->
<div class="page" id="page-amadot">
  <div class="amadot-body">
    <!-- Summary row -->
    <div class="amadot-sumrow" id="amadotSum"></div>
    <!-- Overview chart -->
    <div class="sec-ttl">ממוצע לפי שאלה (סולם 1–5)</div>
    <div class="amadot-ov-wrap"><div class="ov-chart"><canvas id="amadotOvCanvas"></canvas></div></div>
    <!-- Groups -->
    <div class="sec-ttl">פירוט לפי נושא</div>
    <div id="amadotGroups"></div>
  </div>
</div>

// =================== HELPERS ===================
function pct(q, isPre) {
  const a = isPre ? q.pre : q.post;
  const tot = a.reduce((s,v)=>s+v,0);
  return tot ? Math.round(a[q.ok]/tot*100) : 0;
}
function avgTopic(t, isPre) {
  const ps = t.qs.map(q=>pct(q,isPre));
  return Math.round(ps.reduce((s,v)=>s+v,0)/ps.length);
}

// =================== TABS ===================
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((el,i) => el.classList.toggle('active', (i===0&&tab==='prepost')||(i===1&&tab==='amadot')));
  document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
  document.getElementById('page-'+tab).classList.add('active');
  if(tab==='amadot') renderAmadot();
}
