       ok:0, pre:[25,28,16,9], post:[5,1,0,1]},
      {t:'יחס עיסויים : הנשמות בהחייאת מבוגר:',
       opts:['30 עיסויים ו-2 הנשמות','15 עיסויים ו-2 הנשמות','5 עיסויים ו-2 הנשמות','2 עיסויים ו-30 הנשמות'],
       ok:0, pre:[28,20,11,19], post:[4,3,0,0]},
      {t:'לפני תחילת החייאה חשוב ל:',
       opts:['כל התשובות נכונות','להזעיק עזרה','לשמור על בטיחות','לחבר דפיברלטור'],
       ok:0, pre:[41,21,10,5], post:[6,1,0,0]},
      {t:'סנדלי חבלה משמשות ל:',
       opts:['הרחבת שטח הפנים + הפחתת לחץ על הפצע','לקבע פצצות למקום','סנדלים הקשורות לחבלים','להחלקה על הקרח'],
       ok:0, pre:[30,26,11,9], post:[6,1,0,0]}
    ]
  }
];

function pct(q, isPre) {
  const a = isPre ? q.pre : q.post;
  const tot = a.reduce((s,v)=>s+v,0);
  return tot ? Math.round(a[q.ok]/tot*100) : 0;
}
function avg(topic, isPre) {
  const ps = topic.qs.map(q=>pct(q,isPre));
  return Math.round(ps.reduce((s,v)=>s+v,0)/ps.length);
}

// ---- Home ----
function renderHome() {
  const g = document.getElementById('topicGrid');
  g.innerHTML = '';
  T.forEach((t,i) => {
    const pa = avg(t,true), qa = avg(t,false), d = qa-pa;
    const cls = d>3?'pos':d<-3?'neg':'neu';
    const arrow = d>3?'↑':d<-3?'↓':'→';
    g.innerHTML += `
    <div class="card" style="--c:${t.color}" onclick="showDetail(${i})">
      <div class="card-icon">${t.icon}</div>
      <div class="card-title">${t.name}</div>
      <div class="card-desc">${t.desc}</div>
      <div class="card-stats">
        <div class="stat"><div class="stat-lbl">פרה</div><div class="stat-val">${t.preN}</div></div>
        <div class="stat"><div class="stat-lbl">פוסט</div><div class="stat-val">${t.postN}</div></div>
        <div class="stat"><div class="stat-lbl">שאלות</div><div class="stat-val">${t.qs.length}</div></div>
      </div>
      <div class="card-imp">
        <span class="imp-arrow ${cls}">${arrow} ${Math.abs(d)}%</span>
        <span class="imp-txt">${pa}% → ${qa}% נכונות בממוצע</span>
      </div>
    </div>`;
  });
}

// ---- Detail ----
let ovChart = null, qCharts = [];

function showDetail(idx) {
  const t = T[idx];
  document.getElementById('home').style.display = 'none';
  document.getElementById('detail').style.display = 'block';
  window.scrollTo(0,0);

  document.getElementById('detTitle').innerHTML = `${t.icon} ${t.name}`;

  const pa = avg(t,true), qa = avg(t,false), d = qa-pa;
  const dcls = d>=0?'pos':'neg', dsign = d>=0?'+':'';
  document.getElementById('sumRow').innerHTML = `
    <div class="sum-card">
      <h3>תלמידים — פרה</h3>
      <div class="sum-big">${t.preN}</div>
      <div class="sum-sub">${t.preDate}</div>
    </div>
    <div class="sum-card">
      <h3>תלמידים — פוסט</h3>
      <div class="sum-big">${t.postN}</div>
      <div class="sum-sub">${t.postDate}</div>
    </div>
    <div class="sum-card">
      <h3>ממוצע נכונות — פרה</h3>
      <div class="sum-big pct-blue">${pa}%</div>
      <div class="sum-sub">תחילת שנה</div>
    </div>
    <div class="sum-card">
      <h3>ממוצע נכונות — פוסט</h3>
      <div class="sum-big ${dcls}">${qa}% <span style="font-size:1rem">(${dsign}${d}%)</span></div>
      <div class="sum-sub">סוף שנה</div>
    </div>`;

  // Destroy old charts
  if(ovChart){ovChart.destroy();ovChart=null;}
  qCharts.forEach(c=>c.destroy());
  qCharts=[];

  // Overview chart
  const labels = t.qs.map((_,i)=>`שאלה ${i+1}`);
  const preD = t.qs.map(q=>pct(q,true));
  const postD = t.qs.map(q=>pct(q,false));
  ovChart = new Chart(document.getElementById('ovCanvas').getContext('2d'),{
    type:'bar',
    data:{labels,datasets:[
      {label:'פרה — תחילת שנה',data:preD,backgroundColor:t.color+'55',borderColor:t.color,borderWidth:2,borderRadius:5},
      {label:'פוסט — סוף שנה',data:postD,backgroundColor:t.color+'cc',borderColor:t.color,borderWidth:2,borderRadius:5}
    ]},
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{
        legend:{labels:{color:'#e2e8f0',font:{size:12}}},
        tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${c.parsed.y}%`}}
      },
      scales:{
        x:{ticks:{color:'#94a3b8'},grid:{color:'#334155'}},
        y:{min:0,max:100,ticks:{color:'#94a3b8',callback:v=>v+'%'},grid:{color:'#334155'}}
      }
    }
  });

  // Question cards
  const ql = document.getElementById('qList');
  ql.innerHTML = '';
  t.qs.forEach((q,qi)=>{
    const pp = pct(q,true), qp = pct(q,false), dd = qp-pp;
    const ddcls = dd>=0?'pos':'neg', dds = dd>=0?'+':'';
    const h = Math.max(160, q.opts.length*52);
    const cid = `qc${qi}`;
    ql.innerHTML += `
    <div class="q-card">
      <div class="q-num" style="color:${t.color}">שאלה ${qi+1}</div>
      <div class="q-text">${q.t}</div>
      <div class="correct-badge">✓ תשובה נכונה: ${q.opts[q.ok]}</div>
      <div class="q-chart-box" style="height:${h}px"><canvas id="${cid}"></canvas></div>
      <div class="pct-row">
        <div class="pct-card">
          <div class="pct-lbl">פרה — תחילת שנה</div>
          <div class="pct-val pct-blue">${pp}%</div>
        </div>
        <div class="pct-card">
          <div class="pct-lbl">פוסט — סוף שנה</div>
          <div class="pct-val pct-green">${qp}% <span class="delta ${ddcls}">(${dds}${dd}%)</span></div>
        </div>
      </div>
    </div>`;
  });

  setTimeout(()=>{
    t.qs.forEach((q,qi)=>{
      const tp = q.pre.reduce((s,v)=>s+v,0)||1;
      const tq = q.post.reduce((s,v)=>s+v,0)||1;
      const preD = q.pre.map(v=>Math.round(v/tp*100));
      const postD = q.post.map(v=>Math.round(v/tq*100));
      const bgPre = q.opts.map((_,i)=>i===q.ok?'#3b82f6':'#3b82f622');
      const bgPost = q.opts.map((_,i)=>i===q.ok?'#10b981':'#10b98122');
      const brPre = q.opts.map((_,i)=>i===q.ok?'#3b82f6':'#3b82f644');
      const brPost = q.opts.map((_,i)=>i===q.ok?'#10b981':'#10b98144');
      const c = new Chart(document.getElementById(`qc${qi}`).getContext('2d'),{
        type:'bar',
        data:{labels:q.opts,datasets:[
          {label:'פרה %',data:preD,backgroundColor:bgPre,borderColor:brPre,borderWidth:1,borderRadius:3},
          {label:'פוסט %',data:postD,backgroundColor:bgPost,borderColor:brPost,borderWidth:1,borderRadius:3}
        ]},
        options:{
          responsive:true,maintainAspectRatio:false,indexAxis:'y',
          plugins:{
            legend:{labels:{color:'#e2e8f0',font:{size:11}}},
            tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${c.parsed.x}%`}}
          },
          scales:{
            x:{min:0,max:100,ticks:{color:'#94a3b8',callback:v=>v+'%'},grid:{color:'#334155'}},
            y:{ticks:{color:'#e2e8f0',font:{size:11}},grid:{color:'#1e293b'}}
          }
        }
      });
      qCharts.push(c);
    });
  },80);
}

function showHome(){
  document.getElementById('detail').style.display='none';
  document.getElementById('home').style.display='block';
  if(ovChart){ovChart.destroy();ovChart=null;}
  qCharts.forEach(c=>c.destroy());
  qCharts=[];
}

renderHome();
</script>
</body>
</html>
