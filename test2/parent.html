<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>שאלון הורים - הורים vs ילדים</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">

    <!--
    ═══════════════════════════════════════════════════════════════
    הגדרת Apps Script לשמירת תשובות ב-Google Sheets:
    1. פתח את ה-Google Sheet שלך
    2. Extensions → Apps Script
    3. הדבק את הקוד הבא:

    function doPost(e) {
      var sheet = SpreadsheetApp.getActiveSpreadsheet().getActiveSheet();
      var data = JSON.parse(e.postData.contents);
      sheet.appendRow([new Date(), data.question, "", data.answer]);
      return ContentService.createTextOutput("OK");
    }

    4. Deploy → New deployment → Web app → Anyone can access
    5. העתק את ה-URL והכנס ב-SCRIPT_URL למטה
    ═══════════════════════════════════════════════════════════════
    -->

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Fredoka', sans-serif;
            background: #f5f3ff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            -webkit-user-select: none;
            user-select: none;
        }

        #app {
            width: 100%;
            max-width: 480px;
        }

        .card {
            background: white;
            border-radius: 2.5rem;
            padding: 2rem;
            box-shadow: 0 20px 60px rgba(109, 40, 217, 0.15);
            border-bottom: 10px solid #e9d5ff;
            text-align: center;
        }

        /* ── Intro Screen ── */
        .intro-logo {
            font-size: 4rem;
            margin-bottom: 0.5rem;
        }
        .intro-title {
            font-size: 2rem;
            font-weight: 700;
            color: #581c87;
            margin-bottom: 0.5rem;
        }
        .intro-sub {
            color: #7c3aed;
            font-size: 1.1rem;
            margin-bottom: 2rem;
            line-height: 1.5;
        }

        /* ── Progress ── */
        .progress-wrap {
            background: #f3f0ff;
            border-radius: 999px;
            height: 10px;
            margin-bottom: 1.5rem;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(to left, #7c3aed, #a855f7);
            border-radius: 999px;
            transition: width 0.4s ease;
        }
        .progress-label {
            font-size: 0.85rem;
            color: #a855f7;
            font-weight: 600;
            margin-bottom: 0.75rem;
            text-align: left;
            direction: rtl;
        }

        /* ── Question ── */
        .question-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 1.5rem;
            margin-bottom: 1.25rem;
            background: #f3f0ff;
        }
        .question-title {
            font-size: 1rem;
            font-weight: 700;
            color: #7c3aed;
            margin-bottom: 0.35rem;
            letter-spacing: 0.5px;
        }
        .question-text {
            font-size: 1.25rem;
            font-weight: 600;
            color: #1e1b4b;
            line-height: 1.4;
            margin-bottom: 1.5rem;
        }

        /* ── Answer Buttons ── */
        .answers {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        .answer-btn {
            background: #faf5ff;
            border: 3px solid #e9d5ff;
            border-radius: 1.25rem;
            padding: 1rem 1.25rem;
            font-family: 'Fredoka', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            color: #4c1d95;
            cursor: pointer;
            transition: all 0.15s ease;
            text-align: right;
            line-height: 1.4;
            border-bottom-width: 5px;
        }
        .answer-btn:hover {
            background: #ede9fe;
            border-color: #a855f7;
            transform: translateY(-2px);
        }
        .answer-btn.selected {
            background: #7c3aed;
            border-color: #5b21b6;
            color: white;
            transform: translateY(2px);
            border-bottom-width: 3px;
        }
        .answer-btn:active {
            transform: translateY(3px);
            border-bottom-width: 2px;
        }

        /* ── Nav Buttons ── */
        .btn-primary {
            display: block;
            width: 100%;
            margin-top: 1.25rem;
            padding: 1rem;
            background: #7c3aed;
            color: white;
            border: none;
            border-radius: 1.25rem;
            border-bottom: 6px solid #4c1d95;
            font-family: 'Fredoka', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.15s ease;
        }
        .btn-primary:hover { background: #6d28d9; }
        .btn-primary:active { transform: translateY(3px); border-bottom-width: 3px; }
        .btn-primary:disabled { background: #d8b4fe; border-bottom-color: #a855f7; cursor: not-allowed; }

        .btn-secondary {
            display: block;
            width: 100%;
            margin-top: 0.75rem;
            padding: 0.75rem;
            background: transparent;
            color: #7c3aed;
            border: 2px solid #d8b4fe;
            border-radius: 1.25rem;
            font-family: 'Fredoka', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s ease;
        }
        .btn-secondary:hover { background: #f5f3ff; }

        /* ── Done Screen ── */
        .done-icon { font-size: 5rem; margin-bottom: 1rem; }
        .done-title {
            font-size: 2rem;
            font-weight: 700;
            color: #059669;
            margin-bottom: 0.5rem;
        }
        .done-sub {
            color: #6b7280;
            font-size: 1.1rem;
            line-height: 1.5;
        }

        /* ── Loading overlay ── */
        .loading {
            position: fixed;
            inset: 0;
            background: rgba(109, 40, 217, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;
            display: none;
        }
        .loading.show { display: flex; }
        .spinner {
            width: 60px;
            height: 60px;
            border: 6px solid #e9d5ff;
            border-top-color: #7c3aed;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in { animation: fadeIn 0.35s ease; }

        @keyframes bounceIn {
            0% { opacity: 0; transform: scale(0.6); }
            60% { transform: scale(1.08); }
            100% { opacity: 1; transform: scale(1); }
        }
        .bounce-in { animation: bounceIn 0.55s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    </style>
</head>
<body>

<div id="app"></div>
<div class="loading" id="loading"><div class="spinner"></div></div>

<script>
// ── CONFIG ──────────────────────────────────────────────────────────
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx_osM5tuf-a6IdTA5ru8bHrhN2hNyqNCvhgno9VlEWGbLjd-aBItz3eykvF6wkhx-G/exec';

const QUESTIONS = [
    { id: 1, title: "המפגש בבית", question: "כשהילד/ה נכנסים הביתה בפרצוף מבואס, מה הפעולה הראשונה שלכם?", options: ["שואלים מיד 'מה קרה?'", "נותנים חיבוק חזק ומחכים שהם יפתחו בשיחה."], img: "1o-n-8LfZCIlrtxFu_tk-qOC-F9QKVvxq" },
    { id: 2, title: "שיתוף ברגשות", question: "האם אתם משתפים את הילדים כשעובר עליכם יום קשה או כשאתם עצובים?", options: ["כן, שילמדו שזה אנושי להרגיש ככה", "לא, אני רוצה להגן עליהם מהדאגות שלי"], img: "1cSgRYXXS3QWpIiXVWkqvPcHtW2E54qcL" },
    { id: 3, title: "מילים בונות", question: "באיזו תדירות אתם אומרים לילד/ה 'אני גאה בך' בלי קשר להישגים?", options: ["לפחות פעם ביום", "כשיש סיבה מיוחדת או רגע מרגש"], img: "16Kwj9wyAqNoCHfi6I8G29mgopRPkip7U" },
    { id: 4, title: "סדרי עדיפויות", question: "על מה אתם הכי מתעקשים ומציבים גבולות בבית?", options: ["סדר, שיעורי בית ומטלות", "כבוד הדדי, שפה מכבדת ועזרה לאחר"], img: "1Zl3VnleLqFvu5DtnQIaxbaAxfArDVw5n" },
    { id: 5, title: "הילד כמומחה", question: "כשיש לכם תקלה בטלפון, האם תבקשו עזרה מהילד/ה?", options: ["בטח, הם המומחים האמיתיים!", "לא, אני מעדיף להסתדר לבד"], img: "1NiXG7P5dixxUiqoZvrFjIzjRC8Ztl3DE" },
    { id: 6, title: "דוגמה אישית", question: "מי לדעתכם צריך להניח ראשון את הטלפון בצד בזמן משפחתי?", options: ["הילדים", "ההורים"], img: "1P2mFoTU3SE7PpnFJEuMgt8byD2XvM_UZ" },
    { id: 7, title: "זיכרונות לעתיד", question: "מה לדעתכם הילד/ה שלכם יזכרו הכי לטובה בעוד 20 שנה?", options: ["את המתנות והטיולים הגדולים", "את רגעי הצחוק והביטחון"], img: "1ycMjny2ChN20AWS7UQ-nV-NTr6HJ4NDb" },
    { id: 8, title: "התמודדות עם כישלון", question: "איך אתם מגיבים כשהילד/ה נכשלים במשהו למרות שהתאמצו?", options: ["מנתחים יחד מה לא עבד", "מחבקים ומשבחים על הדרך"], img: "1cgkBDpups2f73dRLcLtQntJhw_xYDe0k" },
    { id: 9, title: "אנושיות הורית", question: "האם אתם מספרים לילדים על 'פאדיחות' שעשיתם כשהייתם בגילם?", options: ["בטח, זה מחבר ומצחיק.", "פחות, אני מעדיף לשמור על סמכות."], img: "1Mcux0_JQbxLy0oUD2p42TFWwJrusXcpm" },
    { id: 10, title: "הצורך האמיתי", question: "מה לדעתכם הילד/ה שלכם הכי רוצים מכם כרגע?", options: ["שתקנו להם משהו שביקשו", "שתקשיבו להם 10 דקות ביום"], img: "1LSulgurN3Haqh3BB5sCysVy2Ml76HG4u" }
];

// ── STATE ────────────────────────────────────────────────────────────
let screen = 'intro';   // 'intro' | 'question' | 'done'
let currentIdx = 0;
let selectedAnswer = null;  // 0 or 1
let answers = [];           // [{question: 1, answer: "..."}, ...]

// ── RENDER ───────────────────────────────────────────────────────────
function render() {
    const app = document.getElementById('app');
    if (screen === 'intro') app.innerHTML = renderIntro();
    else if (screen === 'question') app.innerHTML = renderQuestion();
    else if (screen === 'done') app.innerHTML = renderDone();
    attachEvents();
}

function renderIntro() {
    return `
    <div class="card bounce-in">
        <div class="intro-logo">👨‍👩‍👧‍👦</div>
        <h1 class="intro-title">הורים vs ילדים</h1>
        <p class="intro-sub">
            ענו על 10 שאלות קצרות<br>
            ונגלה יחד מה הילדים חושבים!
        </p>
        <button class="btn-primary" id="btn-start">בואו נתחיל! 🚀</button>
    </div>`;
}

function renderQuestion() {
    const q = QUESTIONS[currentIdx];
    const progress = ((currentIdx) / QUESTIONS.length) * 100;
    return `
    <div class="card fade-in">
        <div class="progress-label">שאלה ${currentIdx + 1} מתוך ${QUESTIONS.length}</div>
        <div class="progress-wrap">
            <div class="progress-bar" style="width:${progress}%"></div>
        </div>
        <img
            class="question-img"
            src="https://drive.google.com/thumbnail?id=${q.img}&sz=w600"
            alt="${q.title}"
            onerror="this.style.display='none'"
        />
        <div class="question-title">${q.title}</div>
        <p class="question-text">${q.question}</p>
        <div class="answers">
            <button class="answer-btn ${selectedAnswer === 0 ? 'selected' : ''}" data-idx="0">
                ${q.options[0]}
            </button>
            <button class="answer-btn ${selectedAnswer === 1 ? 'selected' : ''}" data-idx="1">
                ${q.options[1]}
            </button>
        </div>
        <button class="btn-primary" id="btn-next" ${selectedAnswer === null ? 'disabled' : ''}>
            ${currentIdx < QUESTIONS.length - 1 ? 'שאלה הבאה ←' : 'סיום ושליחה ✓'}
        </button>
    </div>`;
}

function renderDone() {
    return `
    <div class="card bounce-in">
        <div class="done-icon">🎉</div>
        <h2 class="done-title">תודה רבה!</h2>
        <p class="done-sub">
            תשובותיכם נשמרו בהצלחה.<br>
            נתראה בהרצאה!
        </p>
    </div>`;
}

// ── EVENTS ───────────────────────────────────────────────────────────
function attachEvents() {
    document.getElementById('btn-start')?.addEventListener('click', () => {
        screen = 'question';
        currentIdx = 0;
        selectedAnswer = null;
        answers = [];
        render();
    });

    document.querySelectorAll('.answer-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            selectedAnswer = parseInt(btn.dataset.idx);
            render();
        });
    });

    document.getElementById('btn-next')?.addEventListener('click', async () => {
        if (selectedAnswer === null) return;
        const q = QUESTIONS[currentIdx];
        answers.push({ questionId: q.id, question: q.question, answer: q.options[selectedAnswer] });

        if (currentIdx < QUESTIONS.length - 1) {
            currentIdx++;
            selectedAnswer = null;
            render();
        } else {
            await submitAnswers();
        }
    });
}

// ── SUBMIT ───────────────────────────────────────────────────────────
async function submitAnswers() {
    if (!SCRIPT_URL) {
        // אם אין URL — מראים מסך סיום בכל אופן
        screen = 'done';
        render();
        return;
    }

    document.getElementById('loading').classList.add('show');
    try {
        for (const entry of answers) {
            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(entry)
            });
        }
    } catch (err) {
        console.error('Submit error:', err);
    } finally {
        document.getElementById('loading').classList.remove('show');
        screen = 'done';
        render();
    }
}

// ── INIT ─────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
