<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🔐 האקר פאזל — שומרי הסייבר</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700;900&display=swap');
:root{
  --g:#00ff99;--g2:#00cc77;--dark:#080e08;--card:#0e160e;
  --border:#1a3020;--text:#cceedd;--muted:#5a8a6a;
  --red:#ff4455;--yellow:#ffe066;--blue:#55aaff;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:var(--dark);color:var(--text);
  font-family:'Heebo',sans-serif;direction:rtl;
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:repeating-linear-gradient(to bottom,
    transparent 0,transparent 3px,rgba(0,255,80,.016) 3px,rgba(0,255,80,.016) 4px);
}
#bgCanvas{position:fixed;inset:0;opacity:.07;z-index:0;pointer-events:none;}

.shell{position:relative;z-index:1;width:min(680px,96vw);padding:10px;}

/* top bar */
.topbar{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.logo{font-size:15px;font-weight:700;color:var(--g);letter-spacing:1px;white-space:nowrap;}
.logo span{color:#fff;}
.prog-wrap{flex:1;height:8px;background:#0a140a;border:1px solid var(--border);border-radius:20px;overflow:hidden;}
#progBar{height:100%;background:linear-gradient(90deg,var(--g2),var(--g));border-radius:20px;transition:width .5s;}
.counter{font-size:13px;color:var(--muted);white-space:nowrap;}
.counter b{color:var(--g);}

/* card */
.card{
  background:var(--card);border:1px solid var(--border);
  border-radius:14px;overflow:hidden;
  box-shadow:0 0 40px #00ff4410;
  transition:box-shadow .25s;
}
.card.flash-ok {box-shadow:0 0 50px #00ff9944,0 0 0 2px var(--g);}
.card.flash-bad{box-shadow:0 0 50px #ff445544,0 0 0 2px var(--red);}

.card-top{
  background:linear-gradient(90deg,#030e03,#0a1a0a);
  border-bottom:1px solid var(--border);
  padding:14px 20px;
  display:flex;align-items:center;justify-content:space-between;gap:10px;
}
.type-badge{
  font-size:13px;font-weight:700;padding:4px 14px;border-radius:20px;
  letter-spacing:.5px;
}
.type-badge.lesson{background:#001a08;border:1px solid var(--g2);color:var(--g);}
.type-badge.google{background:#001a2a;border:1px solid var(--blue);color:var(--blue);}
.pts-badge{font-size:14px;color:var(--yellow);font-weight:700;transition:color .3s;}
.pts-badge.earned{color:var(--g);animation:ptsEarned .4s ease;}
@keyframes ptsEarned{0%{transform:scale(1)}50%{transform:scale(1.3)}100%{transform:scale(1)}}

/* body */
.card-body{padding:24px 22px 18px;}

.q-text{
  font-size:clamp(16px,3.2vw,21px);font-weight:700;color:#fff;
  line-height:1.6;min-height:58px;margin-bottom:22px;
}

.ans-input{
  width:100%;padding:14px 16px;
  background:#050e05;border:2px solid var(--border);
  border-radius:10px;color:#fff;font-size:16px;
  font-family:'Heebo',sans-serif;outline:none;
  direction:rtl;
  transition:border-color .2s;
}
.ans-input:focus{border-color:var(--g2);}
.ans-input.success{border-color:var(--g);background:#001a08;color:var(--g);}
.ans-input.shake{animation:shake .35s ease;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}

.action-row{
  display:flex;gap:10px;margin-top:12px;flex-wrap:wrap;
}
.btn-hint{
  padding:10px 18px;background:#060e06;border:1px solid #2a5a2a;
  border-radius:8px;color:#aaee99;font-size:14px;font-weight:600;
  cursor:pointer;font-family:'Heebo',sans-serif;white-space:nowrap;
  transition:background .15s;
}
.btn-hint:hover:not(:disabled){background:#0d1f0d;}
.btn-hint:disabled{opacity:.5;cursor:default;}
.btn-search{
  padding:10px 18px;background:#001022;border:1px solid #2a5080;
  border-radius:8px;color:var(--blue);font-size:14px;font-weight:600;
  cursor:pointer;font-family:'Heebo',sans-serif;white-space:nowrap;
  text-decoration:none;display:inline-flex;align-items:center;
  transition:background .15s;
}
.btn-search:hover{background:#001a38;}
.btn-submit{
  margin-right:auto;padding:10px 26px;
  background:linear-gradient(135deg,#003a18,#005025);
  border:2px solid var(--g2);border-radius:8px;
  color:var(--g);font-size:15px;font-weight:700;
  cursor:pointer;font-family:'Heebo',sans-serif;
  transition:box-shadow .15s,transform .1s;
}
.btn-submit:hover:not(:disabled){box-shadow:0 0 18px #00ff9944;transform:translateY(-2px);}
.btn-submit:disabled{opacity:.5;cursor:default;}

.hint-box{
  margin-top:12px;background:#111a06;
  border:1px solid #4a7a00;border-right:3px solid #aaee00;
  border-radius:8px;padding:10px 14px;
  font-size:14px;color:#ccee88;
  animation:slideDown .25s ease;
}
@keyframes slideDown{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}

.feedback{min-height:20px;margin-top:12px;font-size:14px;font-weight:600;padding:0 4px;}
.feedback.ok{color:var(--g);}
.feedback.bad{color:var(--red);}

.btn-next{
  display:none;width:100%;margin-top:16px;
  padding:14px;background:linear-gradient(135deg,#003a18,#005025);
  border:2px solid var(--g2);border-radius:10px;
  color:var(--g);font-size:16px;font-weight:700;
  cursor:pointer;font-family:'Heebo',sans-serif;
  transition:box-shadow .2s,transform .1s;
}
.btn-next:hover{box-shadow:0 0 22px #00ff9944;transform:translateY(-2px);}

/* footer */
.card-foot{
  border-top:1px solid var(--border);padding:11px 20px;
  display:flex;align-items:center;justify-content:space-between;
  background:#070f07;font-size:14px;color:var(--muted);
}
#scoreVal{font-size:22px;font-weight:900;color:var(--g);}
#scoreVal.pop{animation:scorePop .3s ease;}
@keyframes scorePop{0%{transform:scale(1)}50%{transform:scale(1.4)}100%{transform:scale(1)}}
.score-pts-row{display:flex;align-items:center;gap:8px;}

/* ── overlay ── */
.overlay{
  position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.9);
  display:none;align-items:center;justify-content:center;flex-direction:column;gap:12px;
}
.ov-inner{text-align:center;}
.decrypt-msg{font-size:22px;font-family:'Courier New',monospace;color:var(--g);letter-spacing:2px;}
.dots span{
  display:inline-block;font-size:26px;color:var(--g);
  animation:dot 1s infinite;
}
.dots span:nth-child(2){animation-delay:.2s;}
.dots span:nth-child(3){animation-delay:.4s;}
@keyframes dot{0%,80%,100%{opacity:0}40%{opacity:1}}

/* ── victory ── */
#victoryOv{
  position:fixed;inset:0;z-index:60;background:#000;
  display:none;align-items:center;justify-content:center;flex-direction:column;
  text-align:center;overflow:hidden;
}
#vCanvas{position:absolute;inset:0;}
.v-inner{
  position:relative;z-index:1;
  animation:fadeUp .7s ease forwards;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.v-icon{font-size:80px;display:block;margin-bottom:8px;}
.v-title{
  font-size:clamp(30px,7vw,60px);font-weight:900;color:var(--g);
  text-shadow:0 0 30px var(--g),0 0 60px #00ff9966;
  animation:glow 2s infinite;
  margin-bottom:6px;
}
@keyframes glow{0%,100%{text-shadow:0 0 30px var(--g),0 0 60px #00ff9966}50%{text-shadow:0 0 60px var(--g),0 0 120px #00ff99aa}}
.v-sub{font-size:18px;color:#88ffcc;margin-bottom:18px;letter-spacing:1px;}
.v-stars{font-size:40px;letter-spacing:8px;margin-bottom:18px;}
.v-score-box{
  background:#001a0a;border:2px solid var(--g);border-radius:12px;
  padding:16px 36px;display:inline-block;margin-bottom:24px;
}
.v-score-lbl{font-size:13px;color:var(--muted);margin-bottom:4px;}
.v-score-num{font-size:50px;font-weight:900;color:var(--g);line-height:1;}
.v-score-max{font-size:14px;color:var(--muted);margin-top:4px;}
.v-restart{
  padding:13px 36px;background:linear-gradient(135deg,#003a18,#005025);
  border:2px solid var(--g2);border-radius:10px;
  color:var(--g);font-size:17px;font-weight:700;
  cursor:pointer;font-family:'Heebo',sans-serif;
}
.v-restart:hover{box-shadow:0 0 22px #00ff9944;}
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<div class="shell">
  <div class="topbar">
    <div class="logo">🔐 <span>האקר</span>פאזל</div>
    <div class="prog-wrap"><div id="progBar"></div></div>
    <div class="counter">שאלה <b id="qIdx">1</b> מתוך <b id="qTot">9</b></div>
  </div>

  <div class="card" id="mainCard">
    <div class="card-top">
      <span class="type-badge lesson" id="typeBadge">📚 מהשיעור</span>
      <span class="pts-badge" id="ptsBadge">💎 100 נקודות</span>
    </div>
    <div class="card-body">
      <div class="q-text" id="qText"></div>

      <input id="ansInput" class="ans-input" type="text"
             placeholder="כתבו את תשובתכם כאן..."
             onkeydown="if(event.key==='Enter')doSubmit()">

      <div class="action-row">
        <button class="btn-hint" id="hintBtn" onclick="useHint()">💡 רמז</button>
        <a class="btn-search" id="searchBtn" target="_blank" style="display:none">🔍 חפשו בגוגל</a>
        <button class="btn-submit" id="submitBtn" onclick="doSubmit()">שלח ←</button>
      </div>

      <div class="hint-box" id="hintBox" style="display:none"></div>
      <div class="feedback" id="feedback"></div>
      <button class="btn-next" id="nextBtn" onclick="nextQ()">המשימה הבאה ←</button>
    </div>

    <div class="card-foot">
      <div class="score-pts-row">
        <span style="color:var(--muted)">ניקוד:</span>
        <span id="scoreVal">0</span>
      </div>
      <span style="font-size:13px;color:var(--muted)" id="attemptsLabel"></span>
    </div>
  </div>
</div>

<!-- decrypt overlay -->
<div class="overlay" id="decryptOv">
  <div class="ov-inner">
    <div class="decrypt-msg" id="decryptMsg">מפענח משימה הבאה...</div>
    <div class="dots"><span>●</span><span>●</span><span>●</span></div>
  </div>
</div>

<!-- victory -->
<div id="victoryOv">
  <canvas id="vCanvas"></canvas>
  <div class="v-inner">
    <span class="v-icon">🛡️</span>
    <div class="v-title">כל הכבוד חוקר!</div>
    <div class="v-sub">השלמת את כל משימות הסייבר</div>
    <div id="vStars" class="v-stars"></div>
    <div class="v-score-box">
      <div class="v-score-lbl">ניקוד סופי</div>
      <div id="vScoreNum" class="v-score-num">0</div>
      <div id="vScoreMax" class="v-score-max"></div>
    </div>
    <button class="v-restart" onclick="restart()">🔄 שחק שוב</button>
  </div>
</div>

<script>
/* ══════════════════════════════════════════
   תשובות מוצפנות — לא לקרוא בהשראה! 😄
   כל תשובה מאוחסנת כמערך של קודי Unicode
   כדי שלא יהיה אפשר לגלות את התשובה ב-Inspect
══════════════════════════════════════════ */

function norm(s){
  return s.trim().toLowerCase()
    .replace(/ך/g,'כ')  // ך → כ
    .replace(/ם/g,'מ')  // ם → מ
    .replace(/ן/g,'נ')  // ן → נ
    .replace(/ף/g,'פ')  // ף → פ
    .replace(/ץ/g,'צ'); // ץ → צ
}
function enc(s){
  return norm(s).split('').map(c=>c.charCodeAt(0)).join(',');
}
function chk(input,q){
  return q.a.some(a => enc(input) === a);
}

/* ══════════════════════════════════════════
   שאלות
   type: 'lesson' = מהשיעור  |  'google' = בגוגל
   a: מערך תשובות מקובלות (מוצפנות)
   hint: רמז
   search: שאילתת גוגל (לשאלות google בלבד)
══════════════════════════════════════════ */
const QUESTIONS = [
  {
    type:'lesson',
    text:'איך קוראים לסוג הוירוס שנועל קבצים ודורש כסף להחזרתם?',
    a:[
      '1499,1493,1508,1512',        // כופר
      '114,97,110,115,111,109'      // ransom
    ],
    hint:'חשבו על הכסף שדורש ההאקר — כסף ___',
    search:null
  },
  {
    type:'google',
    text:'באיזו שנה פרצה מתקפת WannaCry?',
    a:[
      '50,48,49,55'                 // 2017
    ],
    hint:'חפשו בגוגל: WannaCry attack year',
    search:'WannaCry ransomware attack year'
  },
  {
    type:'lesson',
    text:'מה שם הכלי בדפדפן Chrome שמאפשר לראות את קוד המקור? (אפשר לענות בעברית או אנגלית)',
    a:[
      '1489,1491,1497,1511,1492',   // בדיקה
      '105,110,115,112,101,99,116'  // inspect
    ],
    hint:'קליק ימני על כל דף — ראו מה כתוב שם',
    search:null
  },
  {
    type:'google',
    text:'כמה מדינות בעולם נפגעו ממתקפת WannaCry?',
    a:[
      '49,53,48'                    // 150
    ],
    hint:'חפשו בגוגל: WannaCry countries affected',
    search:'WannaCry how many countries affected'
  },
  {
    type:'lesson',
    text:'מה שם תוכנת עריכת הטקסט הפשוטה שבה השתמשנו לעריכת קוד HTML? (בעברית או אנגלית)',
    a:[
      '1499,1514,1489,1504',        // כתבן
      '110,111,116,101,112,97,100'  // notepad
    ],
    hint:'תוכנה זו מגיעה מובנית עם Windows — שמה גם באנגלית',
    search:null
  },
  {
    type:'google',
    text:'מה שם פרצת האבטחה ב-Windows שניצל WannaCry כדי להתפשט ברשת?',
    a:[
      '101,116,101,114,110,97,108,98,108,117,101'  // eternalblue
    ],
    hint:'שתי מילים באנגלית — המילה הראשונה: Eternal',
    search:'WannaCry exploit vulnerability name NSA'
  },
  {
    type:'google',
    text:'מה שם הכינוי (username) של מרקוס האצ׳ינס — החוקר שעצר את WannaCry?',
    a:[
      '109,97,108,119,97,114,101,116,101,99,104'  // malwaretech
    ],
    hint:'חפשו בגוגל: Marcus Hutchins hacker nickname',
    search:'Marcus Hutchins hacker nickname Twitter'
  },
  {
    type:'google',
    text:'כמה דולרים דרש WannaCry כפדיון ראשוני לכל מחשב נפגע?',
    a:[
      '51,48,48',       // 300
      '36,51,48,48'     // $300
    ],
    hint:'חפשו בגוגל: WannaCry ransom amount',
    search:'WannaCry ransom demand amount dollars'
  },
  {
    type:'lesson',
    text:'מה שם מנגנון העצירה הנסתר שהטמינו כותבי הוירוס בקוד? (אפשר: kill ___ באנגלית, או מתג ___ בעברית)',
    a:[
      '107,105,108,108,115,119,105,116,99,104',  // killswitch
      '1502,1514,1490',                          // מתג
      '1499,1497,1489,1493,1497'                 // כיבוי
    ],
    hint:'שתי מילים: kill + switch — בעברית: מתג ...',
    search:null
  }
];

/* ══════════════════════════════════════════
   State
══════════════════════════════════════════ */
let qi=0, score=0, curPts=100, hintUsed=false, wrongCt=0;

function init(){
  qi=0; score=0;
  document.getElementById('qTot').textContent = QUESTIONS.length;
  document.getElementById('vScoreMax').textContent = 'מתוך ' + QUESTIONS.length*100;
  renderQ();
  bgMatrix();
}

/* ══════════════════════════════════════════
   Render question
══════════════════════════════════════════ */
function renderQ(){
  curPts=100; hintUsed=false; wrongCt=0;
  const q = QUESTIONS[qi];

  document.getElementById('qIdx').textContent = qi+1;
  document.getElementById('progBar').style.width = (qi/QUESTIONS.length*100)+'%';

  const tb = document.getElementById('typeBadge');
  tb.textContent = q.type==='lesson' ? '📚 מהשיעור' : '🔍 בגוגל';
  tb.className   = 'type-badge ' + q.type;

  document.getElementById('ptsBadge').textContent = '💎 100 נקודות';
  document.getElementById('ptsBadge').className   = 'pts-badge';
  document.getElementById('attemptsLabel').textContent = '';

  typewrite('qText', q.text);

  const inp = document.getElementById('ansInput');
  inp.value=''; inp.disabled=false; inp.className='ans-input';
  setTimeout(()=>inp.focus(), 320);

  document.getElementById('submitBtn').disabled = false;
  document.getElementById('hintBtn').disabled   = false;
  document.getElementById('hintBtn').textContent = '💡 רמז';

  const sb = document.getElementById('searchBtn');
  if(q.type==='google'){
    sb.style.display='inline-flex';
    sb.href='https://www.google.com/search?q='+encodeURIComponent(q.search);
  } else {
    sb.style.display='none';
  }

  document.getElementById('hintBox').style.display='none';
  document.getElementById('hintBox').textContent='';
  document.getElementById('feedback').textContent='';
  document.getElementById('feedback').className='feedback';
  document.getElementById('nextBtn').style.display='none';
  document.getElementById('scoreVal').textContent=score;

  const card = document.getElementById('mainCard');
  card.classList.remove('flash-ok','flash-bad');
}

/* ══════════════════════════════════════════
   Typewriter
══════════════════════════════════════════ */
function typewrite(id,text){
  const el=document.getElementById(id);
  el.textContent='';
  let i=0;
  const iv=setInterval(()=>{
    el.textContent+=text[i++];
    if(i>=text.length) clearInterval(iv);
  },24);
}

/* ══════════════════════════════════════════
   Submit
══════════════════════════════════════════ */
function doSubmit(){
  const val=document.getElementById('ansInput').value.trim();
  if(!val) return;

  if(chk(val, QUESTIONS[qi])){
    onCorrect();
  } else {
    onWrong();
  }
}

function onCorrect(){
  if(wrongCt>0) curPts=Math.max(20, curPts - wrongCt*20);
  if(hintUsed)  curPts=Math.max(20, curPts - 20);
  score += curPts;

  const inp=document.getElementById('ansInput');
  inp.disabled=true; inp.className='ans-input success';
  document.getElementById('submitBtn').disabled=true;
  document.getElementById('hintBtn').disabled=true;

  const sv=document.getElementById('scoreVal');
  sv.textContent=score;
  sv.classList.remove('pop'); void sv.offsetWidth; sv.classList.add('pop');

  document.getElementById('ptsBadge').textContent='+'+curPts+' נקודות 💎';
  document.getElementById('ptsBadge').className='pts-badge earned';

  const fb=document.getElementById('feedback');
  fb.textContent = '✅ נכון מאוד!' + (curPts===100 ? ' 🌟 ניקוד מלא!' : '');
  fb.className='feedback ok';

  const card=document.getElementById('mainCard');
  card.classList.add('flash-ok');
  setTimeout(()=>card.classList.remove('flash-ok'),700);

  document.getElementById('nextBtn').style.display='block';
}

function onWrong(){
  wrongCt++;
  document.getElementById('attemptsLabel').textContent = 'ניסיון '+wrongCt+' ❌';

  const inp=document.getElementById('ansInput');
  inp.classList.add('shake');
  setTimeout(()=>inp.classList.remove('shake'),400);

  const card=document.getElementById('mainCard');
  card.classList.add('flash-bad');
  setTimeout(()=>card.classList.remove('flash-bad'),400);

  const fb=document.getElementById('feedback');
  fb.textContent='❌ לא נכון — נסו שוב!';
  fb.className='feedback bad';

  inp.value=''; inp.focus();
}

/* ══════════════════════════════════════════
   Hint
══════════════════════════════════════════ */
function useHint(){
  if(hintUsed) return;
  hintUsed=true;
  document.getElementById('hintBtn').disabled=true;
  document.getElementById('hintBtn').textContent='💡 רמז נגלה';
  const hb=document.getElementById('hintBox');
  hb.textContent='💡 '+QUESTIONS[qi].hint;
  hb.style.display='block';
}

/* ══════════════════════════════════════════
   Next / decrypt animation
══════════════════════════════════════════ */
function nextQ(){
  qi++;
  if(qi>=QUESTIONS.length){ showVictory(); return; }
  const msgs=['מפענח משימה הבאה...','בודק נתונים...','מאמת הרשאות...','מתחבר לשרת...'];
  const ov=document.getElementById('decryptOv');
  document.getElementById('decryptMsg').textContent=msgs[qi%msgs.length];
  ov.style.display='flex';
  setTimeout(()=>{ ov.style.display='none'; renderQ(); },900);
}

/* ══════════════════════════════════════════
   Victory
══════════════════════════════════════════ */
function showVictory(){
  document.getElementById('progBar').style.width='100%';
  document.getElementById('vScoreNum').textContent=score;
  const pct=score/(QUESTIONS.length*100);
  document.getElementById('vStars').textContent=pct>0.9?'⭐⭐⭐':pct>0.65?'⭐⭐':'⭐';
  document.getElementById('victoryOv').style.display='flex';
  victoryMatrix();
}

function restart(){
  document.getElementById('victoryOv').style.display='none';
  init();
}

/* ══════════════════════════════════════════
   Matrix backgrounds
══════════════════════════════════════════ */
function bgMatrix(){
  const c=document.getElementById('bgCanvas');
  const ctx=c.getContext('2d');
  c.width=window.innerWidth; c.height=window.innerHeight;
  const F=14,cols=Math.floor(c.width/F),drops=Array(cols).fill(1);
  const ch='01אבגABCDE#@%הסייבר';
  setInterval(()=>{
    ctx.fillStyle='rgba(0,0,0,.05)'; ctx.fillRect(0,0,c.width,c.height);
    ctx.fillStyle='#00ff99'; ctx.font=F+'px monospace';
    drops.forEach((y,i)=>{
      ctx.fillText(ch[Math.random()*ch.length|0],i*F,y*F);
      if(y*F>c.height&&Math.random()>.975) drops[i]=0;
      drops[i]++;
    });
  },60);
}

function victoryMatrix(){
  const c=document.getElementById('vCanvas');
  const ctx=c.getContext('2d');
  c.width=window.innerWidth; c.height=window.innerHeight;
  const F=16,cols=Math.floor(c.width/F),drops=Array(cols).fill(1);
  const ch='01שומריהסייברABCDE@#';
  setInterval(()=>{
    ctx.fillStyle='rgba(0,0,0,.07)'; ctx.fillRect(0,0,c.width,c.height);
    ctx.fillStyle='#00ff99'; ctx.font='bold '+F+'px monospace';
    drops.forEach((y,i)=>{
      ctx.fillText(ch[Math.random()*ch.length|0],i*F,y*F);
      if(y*F>c.height&&Math.random()>.97) drops[i]=0;
      drops[i]++;
    });
  },45);
}

init();
</script>
